<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Contact Form</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Patrick Hand', cursive;
      background: linear-gradient(135deg, #3b82f6, #06d6a0);
      padding: 20px;
    }

    .top-heading {
      color: white;
      font-size: 2rem;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .form-card {
      max-width: 650px;
      margin: 30px auto;
      background: #f7f7f7;
      border-radius: 25px;
      padding: 35px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .form-title {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 25px;
      color: #1f2937;
      font-weight: bold;
    }

    .form-label {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .form-control {
      font-size: 1.25rem;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      margin-bottom: 20px;
    }

    textarea.form-control {
      min-height: 180px;
      resize: vertical;
    }

    .btn-submit {
      width: 100%;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 1.8rem;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background: #0b5ed7;
    }

    .success-box,
    .error-box {
      display: none;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 1.35rem;
    }

    .success-box {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .error-box {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .loading-text {
      display: none;
      text-align: center;
      margin-top: 12px;
      font-size: 1.2rem;
      color: #374151;
    }
  </style>
</head>
<body>

  <div class="top-heading">My Bootstrap Contact Form</div>

  <div class="form-card">
    <h1 class="form-title">Contact Form</h1>

    <div id="successMsg" class="success-box">
      ✅ Your details have been submitted successfully!
    </div>

    <div id="errorMsg" class="error-box">
      ❌ Something went wrong. Please try again.
    </div>

    <form id="contactForm">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Enter your name" required />

      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email" required />

      <label for="message" class="form-label">Message</label>
      <textarea id="message" class="form-control" placeholder="Enter your message" required></textarea>

      <button type="submit" class="btn-submit" id="submitBtn">Submit</button>
      <div class="loading-text" id="loadingText">Submitting... Please wait.</div>
    </form>
  </div>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    // =========================
    // FIREBASE IMPORTS
    // =========================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // =========================
    // FIREBASE CONFIG
    // =========================
    const firebaseConfig = {
      apiKey: "AIzaSyDtOexcihiOJx_D8E1ecY-_UdhgCWtqt8s",
      authDomain: "bootstrapcontactform-e1dfe.firebaseapp.com",
      databaseURL: "https://bootstrapcontactform-e1dfe-default-rtdb.firebaseio.com",
      projectId: "bootstrapcontactform-e1dfe",
      storageBucket: "bootstrapcontactform-e1dfe.firebasestorage.app",
      messagingSenderId: "821142264794",
      appId: "1:821142264794:web:5e53fa94497e90a542fee3",
      measurementId: "G-YGWCKLK88W"
    };

    // =========================
    // EMAILJS CONFIG
    // =========================
    const EMAILJS_PUBLIC_KEY = "JmZKN-BgLIQV5S5d_";
    const EMAILJS_SERVICE_ID = "service_mjfeym9";
    const EMAILJS_TEMPLATE_ID = "template_yjfejmq";

    // =========================
    // INITIALIZE
    // =========================
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    emailjs.init({
      publicKey: EMAILJS_PUBLIC_KEY
    });

    // =========================
    // FORM ELEMENTS
    // =========================
    const contactForm = document.getElementById("contactForm");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const loadingText = document.getElementById("loadingText");
    const submitBtn = document.getElementById("submitBtn");

    // =========================
    // FORM SUBMIT
    // =========================
    contactForm.addEventListener("submit", async function (e) {
      e.preventDefault(); // page refresh stop

      successMsg.style.display = "none";
      errorMsg.style.display = "none";
      loadingText.style.display = "block";
      submitBtn.disabled = true;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      try {
        // 1) SAVE TO FIREBASE
        await push(ref(db, "contactFormSubmissions"), {
          name: name,
          email: email,
          message: message,
          submittedAt: new Date().toLocaleString()
        });

        // 2) SEND EMAIL USING EMAILJS
        await emailjs.send(
          EMAILJS_SERVICE_ID,
          EMAILJS_TEMPLATE_ID,
          {
            from_name: name,
            from_email: email,
            message: message
          }
        );

        // SUCCESS
        successMsg.style.display = "block";
        contactForm.reset();

        // optional auto-hide success
        setTimeout(() => {
          successMsg.style.display = "none";
        }, 5000);

      } catch (error) {
        console.error("Error:", error);
        errorMsg.style.display = "block";
      } finally {
        loadingText.style.display = "none";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
